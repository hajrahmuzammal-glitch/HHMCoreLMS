name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore HHMCoreLMS.sln

      - name: Build solution
        run: dotnet build HHMCoreLMS.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test HHMCoreLMS.sln --no-build --configuration Release --verbosity normal